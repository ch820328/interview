<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Interview Syllabus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="activity-bar">
  <div class="activity-item" data-section="system_design" title="System Design">🏗️</div>
  <div class="activity-item" data-section="algorithms" title="Algorithms">⚙️</div>
  <div class="activity-item" data-section="behavioral" title="Behavioral">💬</div>
  <div class="activity-item" data-section="ai_architecture" title="AI Architecture">🤖</div>
  <div class="activity-item" data-section="questions" title="Question Vault">📚</div>
  <div class="activity-item" data-section="roadmaps" title="Target Prep">🎯</div>
  <div style="margin-top: auto; padding-bottom: 16px;">
    <div id="git-status-dot" title="Git Status" style="width: 10px; height: 10px; border-radius: 50%; background: #238636; margin: 0 auto;"></div>
  </div>
</div>

<nav id="sidebar">
    <div class="sidebar-header">
      <div id="progress-container" style="padding: 10px 16px; border-bottom: 1px solid var(--border);">
        <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; color: var(--muted);">
          <span>MASTERY PROGRESS</span>
          <span id="progress-percent">0%</span>
        </div>
        <div class="progress-bar-bg" style="height: 4px; background: #30363d; border-radius: 2px; overflow: hidden;">
          <div id="progress-fill" style="height: 100%; width: 0%; background: #238636; transition: width 0.3s ease;"></div>
        </div>
      </div>
      <div style="padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px;">
        <input type="text" id="search" placeholder="Search files..." autocomplete="off" style="flex: 1;">
        <button id="hide-mastered-btn" title="Hide Mastered" style="background: none; border: 1px solid var(--border); border-radius: 4px; padding: 4px 6px; cursor: pointer; color: var(--muted); font-size: 14px; display: flex; align-items: center;">👁️</button>
      </div>
      <div id="sidebar-title" style="padding: 10px 16px 5px; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px;"></div>
    </div>
  <div id="file-list"></div>
</nav>

<div id="main">
  <div id="topbar">
    <div id="sidebar-toggle" title="Toggle Sidebar">☰</div>
    <span id="topbar-title">Select a file to preview</span>
    <label id="mastered-toggle" style="margin-left: 12px; font-size: 12px; cursor: pointer;">
      <input type="checkbox" id="mastered-checkbox"> Mastered
    </label>
    <span id="git-status-text" style="font-size: 11px; color: var(--muted); margin-right: 12px;">Git: idle</span>
    <span id="last-update-text" style="font-size: 11px; color: var(--muted); margin-right: 12px;"></span>
    <span id="loading-badge">Loading…</span>
  </div>
  <div id="content-wrap">
    <div id="placeholder">
      <div class="icon">📖</div>
      <p>Select a file from the sidebar to start reading.</p>
    </div>
    <div id="content" style="display:none"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
